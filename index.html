<!DOCTYPE html>
<html>
<head>
<title>Clothing Shop ni Boss Atan</title>
</head>

<body>

<h2>Clothing Order</h2>

<form action="checkout.html" method="get">

<label>Name:</label><br>
<input type="text" name="name" required><br><br>

<label>Undershirt (₱250 each):</label><br>
<input type="number" name="undershirt" min="0" value="0"><br><br>

<label>Sweatpants (₱350 each):</label><br>
<input type="number" name="sweatpants" min="0" value="0"><br><br>

<label>Your Money (₱):</label><br>
<input type="number" name="money" required><br><br>

<button type="submit">Checkout</button>

</form>

</body>
</html>
